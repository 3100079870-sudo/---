<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>北极星计划:重生 — BBNJ 第一关</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:linear-gradient(135deg,#fef9f3 0%,#f5ebe0 100%);
  min-height:100vh;
  color:#2c2c2a;
  line-height:1.7;
  -webkit-font-smoothing:antialiased;
}
.container{max-width:760px;margin:0 auto;padding:20px 16px;min-height:100vh}

/* 标题页 */
.title-screen{text-align:center;padding:80px 20px 40px}
.title-screen .logo{
  display:inline-block;width:80px;height:80px;border-radius:50%;
  background:linear-gradient(135deg,#2c4a6b,#5a8bc1);
  color:#fff;font-size:36px;line-height:80px;margin-bottom:20px;
  box-shadow:0 4px 20px rgba(44,74,107,0.3);
}
.title-screen h1{
  font-size:34px;font-weight:600;color:#2c4a6b;
  margin-bottom:6px;letter-spacing:2px;
}
.title-screen .subtitle{
  font-size:13px;color:#888;letter-spacing:4px;margin-bottom:36px;
}
.title-screen .desc{
  font-size:14px;color:#555;line-height:2;
  max-width:520px;margin:0 auto 30px;
  padding:20px 24px;background:rgba(255,255,255,0.6);
  border-radius:16px;border-left:3px solid #d68c45;
  text-align:left;
}
.title-screen .meta{
  font-size:12px;color:#aaa;margin-bottom:36px;line-height:1.8;
}
.title-screen .meta strong{color:#666}
.start-btn{
  padding:16px 48px;background:#2c4a6b;color:#fff;
  border:none;border-radius:32px;font-size:15px;cursor:pointer;
  font-family:inherit;transition:all 0.2s;letter-spacing:3px;font-weight:500;
  box-shadow:0 4px 16px rgba(44,74,107,0.2);
}
.start-btn:hover{background:#1a3a5b;transform:translateY(-2px);box-shadow:0 6px 20px rgba(44,74,107,0.4)}
.start-btn:active{transform:translateY(0)}

/* 状态栏 */
.status-bar{
  display:flex;flex-wrap:wrap;gap:8px;
  padding:12px 14px;background:#fff;border-radius:14px;
  box-shadow:0 2px 8px rgba(0,0,0,0.04);
  margin-bottom:14px;align-items:center;font-size:13px;
}
.stat{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 12px;background:#f7f3ee;
  border-radius:20px;color:#555;
}
.stat strong{font-weight:600;color:#2c2c2a;font-variant-numeric:tabular-nums}
.stat.danger{background:#fdebec;color:#a52a2a}
.stat.danger strong{color:#a52a2a}
.stat.warn{background:#fdf4e3;color:#8a6500}
.stat.warn strong{color:#8a6500}
.stat-icon{font-size:11px;opacity:0.7}
.profile-btn{
  margin-left:auto;padding:5px 14px;background:#eae6dd;
  border:none;border-radius:20px;cursor:pointer;
  font-size:12px;color:#5d3a1f;font-family:inherit;
}
.profile-btn:hover{background:#dcd5c6}

/* 场景标签 */
.scene-tag{
  font-size:12px;color:#999;
  margin-bottom:10px;letter-spacing:2px;
  text-align:center;
}

/* 主舞台 */
.stage{
  background:#fff;border-radius:18px;
  padding:32px 28px;min-height:260px;
  box-shadow:0 4px 16px rgba(0,0,0,0.05);
  display:flex;flex-direction:column;
  animation:fadeIn 0.4s;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.speaker{
  font-size:14px;font-weight:600;
  margin-bottom:12px;letter-spacing:1px;
}
.speaker.zhou{color:#a67c00}
.speaker.lin{color:#2c5f8d}
.speaker.zhao{color:#8a1a1a}
.speaker.qian{color:#0a5a3a}
.speaker.sun{color:#a04a18}
.speaker.inner{color:#7a5fa1;font-style:italic;font-weight:500}
.dialog{
  font-size:16px;line-height:1.95;color:#2c2c2a;flex:1;
}
.narrator{
  font-size:15px;line-height:1.95;color:#666;
  font-style:italic;text-align:center;padding:20px 10px;
}
.system-msg{
  background:linear-gradient(135deg,#fff7e8,#fdf0d1);
  padding:18px 22px;border-radius:12px;
  border-left:4px solid #d68c45;
  font-size:15px;color:#7a4a18;line-height:1.85;
}
.lightbulb{
  display:inline-flex;align-items:center;gap:8px;
  margin-top:16px;padding:11px 22px;
  background:linear-gradient(135deg,#fff5b8,#ffe066);
  color:#7a5f00;border:none;border-radius:30px;
  font-size:14px;cursor:pointer;font-family:inherit;
  box-shadow:0 2px 8px rgba(255,224,102,0.5);
  animation:glow 1.6s infinite alternate;font-weight:500;
}
@keyframes glow{
  from{box-shadow:0 2px 8px rgba(255,224,102,0.5)}
  to{box-shadow:0 2px 18px rgba(255,200,40,0.8)}
}
.lightbulb:hover{transform:translateY(-2px)}
.lightbulb-icon{font-size:18px}

.choices{display:flex;flex-direction:column;gap:10px;margin-top:24px}
.choice-btn{
  padding:14px 20px;background:#f9f6f0;
  border:1.5px solid #e8e2d6;border-radius:12px;
  cursor:pointer;text-align:left;
  font-size:14px;line-height:1.75;font-family:inherit;
  color:#2c2c2a;transition:all 0.2s;
}
.choice-btn:hover{
  background:#fff;border-color:#2c4a6b;
  transform:translateX(4px);
  box-shadow:0 2px 12px rgba(44,74,107,0.12);
}
.choice-btn:active{transform:translateX(2px)}
.choice-label{font-weight:600;color:#2c4a6b;margin-right:6px}

.next-btn{
  padding:11px 28px;background:#2c4a6b;color:#fff;
  border:none;border-radius:24px;cursor:pointer;
  font-size:13px;font-family:inherit;
  align-self:flex-end;margin-top:20px;letter-spacing:1px;
  transition:all 0.2s;
}
.next-btn:hover{background:#1a3a5b;transform:translateX(2px)}
.next-btn:active{transform:translateX(0)}

/* 属性变化日志 */
.change-log{
  margin-top:16px;padding:10px 14px;
  background:#fafafa;border-radius:10px;
  font-size:12px;color:#666;
  display:flex;flex-wrap:wrap;gap:6px;align-items:center;
  animation:slideIn 0.3s;
}
.change-log .cl-label{color:#999;margin-right:4px}
.delta{padding:3px 10px;border-radius:14px;font-size:11px;font-weight:600}
.delta.good{background:#e3f4d8;color:#2d6e0a}
.delta.bad{background:#fdebec;color:#a52a2a}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* 解锁提示 */
.unlock-toast{
  margin-top:14px;padding:12px 16px;
  background:linear-gradient(135deg,#e8e0f5,#d4c4e8);
  border-radius:12px;color:#4a2e7a;font-size:13px;
  animation:slideIn 0.4s;display:flex;align-items:center;gap:8px;
}

/* 知识卡片 */
.knowledge-card{
  margin-top:16px;padding:22px 24px;
  background:linear-gradient(135deg,#eee8f7,#dbd0ed);
  border-radius:14px;border:1px solid #c4b5e0;
  animation:slideIn 0.4s;
}
.knowledge-card h4{
  font-size:15px;color:#3a2370;margin-bottom:12px;font-weight:600;
}
.knowledge-card .kc-content{
  font-size:13px;line-height:1.9;color:#4a2e7a;
  white-space:pre-line;margin-bottom:10px;
}
.knowledge-card .close-k{
  display:inline-block;font-size:12px;color:#6d4ac4;
  cursor:pointer;text-decoration:underline;margin-top:8px;
}

/* 档案面板 */
.profile-panel{
  background:#fff;border-radius:18px;padding:22px;
  margin-bottom:14px;box-shadow:0 4px 16px rgba(0,0,0,0.05);
  animation:slideIn 0.3s;
}
.profile-panel-head{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:18px;padding-bottom:14px;
  border-bottom:1px solid #f0ebe0;
}
.ph-title{font-size:15px;font-weight:600;color:#2c4a6b;letter-spacing:1px}
.ph-close{
  background:none;border:none;font-size:13px;color:#888;
  cursor:pointer;font-family:inherit;padding:4px 10px;border-radius:12px;
}
.ph-close:hover{background:#f5f5f5}
.char-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px;
}
.char-card{
  padding:16px;background:#fafafa;border-radius:12px;
  border:1px solid #f0ebe0;
}
.char-card.locked{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;text-align:center;
  min-height:170px;color:#bbb;gap:8px;
}
.lock-icon{font-size:30px;opacity:0.4}
.char-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.avatar{
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:600;font-size:18px;flex-shrink:0;
}
.avatar.lin{background:#e3effa;color:#1a4a7a}
.avatar.zhou{background:#fdf0d1;color:#7a4a18}
.avatar.zhao{background:#fdebec;color:#8a1a1a}
.avatar.qian{background:#dcf2e8;color:#0a5a3a}
.avatar.sun{background:#fce6da;color:#7a3618}
.char-name{font-size:14px;font-weight:600;color:#2c2c2a;margin:0;line-height:1.4}
.char-role{font-size:11px;color:#888;margin:2px 0 0}
.char-section{
  font-size:10px;color:#aaa;
  margin:10px 0 4px;letter-spacing:1px;text-transform:uppercase;
}
.char-content{font-size:12.5px;color:#444;line-height:1.75;margin:0}
.char-traits{display:flex;flex-wrap:wrap;gap:4px;margin:4px 0}
.trait-tag{
  padding:2px 9px;border-radius:12px;background:#fff;
  font-size:11px;color:#666;border:1px solid #e8e2d6;
}
.char-motive{font-style:italic;color:#2c2c2a;line-height:1.75}

/* 通关结算 */
.ending-clear{
  background:linear-gradient(135deg,#e8f5e0,#c8e9b0);
  border-radius:20px;padding:40px 28px;text-align:center;
  box-shadow:0 4px 16px rgba(0,0,0,0.05);animation:fadeIn 0.6s;
}
.trophy{font-size:54px;margin-bottom:14px}
.ending-clear h3{
  font-size:22px;color:#1f5510;
  margin-bottom:14px;font-weight:600;
}
.ending-clear .countdown{
  font-size:36px;font-weight:700;color:#1f5510;
  margin:18px 0;font-variant-numeric:tabular-nums;
}
.ending-clear .countdown-label{font-size:12px;color:#3a7a18;letter-spacing:2px}
.ending-clear p{color:#2d6e0a;font-size:14px;line-height:1.85;margin-bottom:6px}

.boss-preview{
  margin:22px 0 16px;padding:18px;
  background:#fff;border-radius:14px;text-align:left;
}
.bp-title{
  text-align:center;font-size:12px;color:#666;
  margin-bottom:14px;letter-spacing:2px;
}
.stage-list{
  margin:22px 0;padding:18px 22px;
  background:#fff;border-radius:14px;text-align:left;
}
.stage-item{
  display:flex;align-items:center;gap:12px;
  padding:8px 0;font-size:13px;color:#888;
}
.stage-item.done{color:#1f5510}
.si-icon{
  width:20px;height:20px;display:flex;
  align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;
}
.next-stage-text{
  font-size:12px;color:#3a7a18;
  line-height:1.8;margin-top:16px;
  padding:14px 16px;background:#fff;border-radius:12px;
}

/* BE 结局 */
.ending-be{
  background:linear-gradient(135deg,#fdebec,#f5c6c8);
  border-radius:20px;padding:44px 28px;text-align:center;
  box-shadow:0 4px 16px rgba(0,0,0,0.05);animation:fadeIn 0.6s;
}
.skull{font-size:56px;margin-bottom:16px}
.ending-be h3{
  font-size:20px;color:#7a1414;
  margin-bottom:20px;font-weight:600;letter-spacing:1px;
}
.ending-be p{color:#8a1a1a;font-size:14px;line-height:1.95;margin-bottom:14px}
.ending-be .epitaph{
  font-style:italic;color:#5a0808;margin-top:22px;
  padding-top:18px;border-top:1px dashed #c4848a;font-size:13px;
}

.restart-btn{
  margin-top:24px;padding:12px 36px;background:#fff;
  border:1.5px solid #888;border-radius:24px;cursor:pointer;
  font-size:13px;font-family:inherit;color:#444;letter-spacing:1px;
  transition:all 0.2s;
}
.restart-btn:hover{background:#f5f5f5;transform:translateY(-1px)}

/* footer */
.footer{
  text-align:center;font-size:11px;color:#bbb;
  padding:24px 10px 16px;line-height:1.8;
}

/* 移动端 */
@media (max-width:600px){
  .container{padding:12px 10px}
  .stage{padding:24px 20px;min-height:240px}
  .title-screen{padding:50px 16px 30px}
  .title-screen h1{font-size:26px;letter-spacing:1px}
  .title-screen .desc{padding:16px 18px;font-size:13px}
  .dialog{font-size:15px;line-height:1.9}
  .stat{padding:4px 10px;font-size:12px}
  .ending-clear,.ending-be{padding:32px 22px}
  .ending-clear .countdown{font-size:30px}
  .char-grid{grid-template-columns:1fr}
}
</style>
</head>

  act2_1:{type:'narrator',scene:'导师办公室',text:'导师办公室,阳光明媚。老周正靠在真皮转椅上,悠哉悠哉地吹着保温杯里的红枣枸杞茶。',next:'act2_2'},
  act2_2:{type:'inner',scene:'导师办公室',speaker:'林北(内心疯狂退堂鼓)',text:'(站在门口,社恐发作)好想逃,现在转头回宿舍睡觉还来得及吗?可是不进去,三年后我就要延毕……拼了!',next:'act2_3'},
  act2_3:{type:'zhou',scene:'导师办公室',speaker:'老周',text:'(眼皮微抬)小北啊,在门口探头探脑干嘛?进来。正好,把这本 500 页的 BBNJ 英文评注给我翻译了,下周组会我要听。',unlock:'zhou',next:'act2_4'},
  act2_4:{type:'lin',scene:'导师办公室',speaker:'林北',text:'(血压剧增,但努力挤出微笑)周老师,比起翻译,有个更要命的事。BBNJ 刚生效,我国《环评法》适用范围根本不涵盖公海,这么大的漏洞您不管管?',apply:{bp:5},next:'act2_5'},
  act2_5:{type:'zhou',scene:'导师办公室',speaker:'老周',text:'(战术喝茶,慢条斯理)哦?天塌下来有个子高的顶着。你一个还没正式入学的研究生,操心部委的事?',next:'act2_choice'},
  act2_choice:{type:'system',scene:'关键决策 1 · 应对导师',text:'你的社恐与毒舌正在激烈交锋,请选择应对策略:',choices:[
    {label:'A',text:'毒舌发作:"老师,天塌下来您个子也不高啊!到时候真出了事您受刺激进了医院,谁给我签字毕业?"',next:'act2_a',apply:{bp:50,hair:-10,resource:5,npc:5},flag:'teacher_trust'},
    {label:'B',text:'顺坡下驴:"您说得太有道理了!是我多虑了,我这就回去睡……啊不,回去翻译文献。"',next:'act2_b',apply:{social:5,hair:-10,resource:3}}
  ]},
  act2_a:{type:'zhou',scene:'导师办公室',speaker:'老周',text:'(动作一顿,嘴角勾起一抹"计划通"的狡猾微笑)牙尖嘴利。既然你这么清楚问题的严重性,那撰写《关于填补 BBNJ 环评适用范围缺口》的内参报告,就交给你了。写不好,这学期平时成绩清零。',next:'act2_a2'},
  act2_a2:{type:'inner',scene:'导师办公室',speaker:'林北',text:'(屏幕震动,弹出红字)???我就多余长这张嘴!',next:'act3_1'},
  act2_b:{type:'zhou',scene:'导师办公室',speaker:'老周',text:'站住。(放下保温杯,眼神突然变得犀利)国家海洋权益面前,岂容你睡大觉?我已经向部里推荐了你作为课题助理。这份缺口分析报告,你来写。写不好,你这三年就别想好过。',next:'act2_b2'},
  act2_b2:{type:'inner',scene:'导师办公室',speaker:'林北',text:'(屏幕震动,弹出红字 社恐指数暴击)???您老搁这儿等着我呢?!',next:'act3_1'},
  act3_1:{type:'narrator',scene:'导师办公室 · 写报告',text:'林北被迫坐到了电脑前。',next:'act3_2'},
  act3_2:{type:'inner',scene:'导师办公室 · 写报告',speaker:'林北',text:'(一边疯狂敲键盘一边吐槽)这老狐狸绝对是早就发现漏洞了,故意 PUA 我来当苦力!想考我?哼,带着四年后的记忆,这点法理冲突我倒背如流!',apply:{days:-7},next:'act3_3'},
  act3_3:{type:'lightbulb',scene:'导师办公室 · 写报告',text:'林北头顶出现一个闪闪发光的大灯泡。要不要点开看看他在碎碎念什么?',knowledge:{title:'林北的法学碎碎念 · 缺口一',content:'那些起草法律的大佬到底怎么想的?\n\n我国《环境影响评价法》第 2 条明文写的是,适用于"中华人民共和国管辖的其他海域"。\n\n但 BBNJ 协定第 27 条针对的是"国家管辖范围以外区域(ABNJ)"。\n\n一个管家里,一个管门外——这两者之间差了十万八千里好吗!\n\n如果不把 ABNJ 强行塞进《环评法》的适用范围,我们的科考船出去就是"非法作业",出门是要吃大亏的。\n\n这就是【缺口一:适用范围不明】的核心法理冲突。'},next:'act3_4'},
  act3_4:{type:'zhou',scene:'导师办公室 · 写报告',speaker:'老周',text:'(不知何时站在林北身后,满意地点头)总结得很精辟。那么,你打算怎么把这份报告递上去?',next:'act4_1'},
  act4_1:{type:'zhou',scene:'导师办公室 · 递报告',speaker:'老周',text:'要修法,或者出台补充指南,必须拿到部委的支持。自然资源部、生态环境部、外交部,这三座大山,你想先翻哪一座?',next:'act4_2'},
  act4_2:{type:'lin',scene:'导师办公室 · 递报告',speaker:'林北',text:'报告老师,这三个部门关注点完全不同。我决定投其所好,对症下药。',next:'act4_choice'},
  act4_choice:{type:'system',scene:'关键决策 2 · 报告核心策略',text:'请选择你报告的核心策略(这将决定第二关你要去哪个部门"挨骂"):',choices:[
    {label:'A',text:'拿捏外交部 — 主打"法律风险与国际反制",列举可能面临的国际诉讼。(条法司高冷女处长正在向你招手)',next:'act4_a',apply:{foreign:30,gap1:20}},
    {label:'B',text:'忽悠自然资源部 — 主打"经济与战略利益",强调不修法就没法去深海挖矿赚钱。(资源部务实派领导表示很赞)',next:'act4_b',apply:{resource:30,gap1:25}},
    {label:'C',text:'道德绑架生态环境部 — 主打"大国环保责任",高举海洋命运共同体大旗。(环评司专家推了推眼镜)',next:'act4_c',apply:{env:30,gap1:20}}
  ]},
  act4_a:{type:'narrator',scene:'递交通道 · 外交部',text:'你瞄准了外交部条法司。报告中详细列举了若中国不及时承接 BBNJ 程序,可能面对的国际诉讼路径、潜在的国家责任与战略反制风险。',next:'act4_end1'},
  act4_b:{type:'narrator',scene:'递交通道 · 自然资源部',text:'你瞄准了自然资源部。报告强调:制度缺位将导致中国在深海生物基因资源开发、远洋科考、北极航运等领域错失先机,经济与战略损失难以估量。',next:'act4_end1'},
  act4_c:{type:'narrator',scene:'递交通道 · 生态环境部',text:'你瞄准了生态环境部。报告高举"海洋命运共同体"与"大国环保责任",论证完善环评制度是中国履行国际义务、塑造负责任大国形象的必由之路。',next:'act4_end1'},
  act4_end1:{type:'zhou',scene:'导师办公室',speaker:'老周',text:'(笑眯眯地递过一张通行证)去吧,年轻人。明天上午 9 点,带着你的报告去部委大楼。记住,不要给咱们学校丢脸。',apply:{days:-5},next:'act4_end2'},
  act4_end2:{type:'inner',scene:'导师办公室',speaker:'林北',text:'(接过通行证,双手微微颤抖)我只是个想毕业的学生……为什么我要承受这个年纪不该承受的国家重担……',next:'ending'},
  ending:{type:'ending'},

  act5_1:{type:'narrator',scene:'外交部条法司 · 会客室',text:'庄严肃穆的部委大楼会客室。冷气开得很足,空气里都是肃杀感。',next:'act5_2'},
  act5_2:{type:'inner',scene:'外交部条法司 · 会客室',speaker:'林北(瑟瑟发抖)',text:'(乖巧地坐在沙发边缘,双手放在膝盖上)这里的冷气是按停尸房的标准开的吗?老周那个坑货,居然真的只给我打了个电话,就让我一个人来送死……',apply:{social:5},next:'act5_3'},
  act5_3:{type:'narrator',scene:'外交部条法司 · 会客室',text:'会客室的门被雷厉风行地推开。高跟鞋踩在地板上,发出清脆的"嗒、嗒、嗒"声。',next:'act5_4'},
  act5_4:{type:'zhao',scene:'外交部条法司 · 会客室',speaker:'赵处长',text:'(一头利落的齐肩短发,穿着深藏青色职业套装,手里拿着林北昨天写的报告。眼神冷得像北冰洋的冰水)你是周教授介绍来的林北?报告我看了。你的"适用范围"分析得还算有点东西。',next:'act5_5'},
  act5_5:{type:'lin',scene:'外交部条法司 · 会客室',speaker:'林北',text:'(受宠若惊,试图站起来)谢、谢谢赵处长,其实我……',next:'act5_6'},
  act5_6:{type:'zhao',scene:'外交部条法司 · 会客室',speaker:'赵处长',text:'(抬手看了一眼腕表,打断施法)但我只有五分钟。因为你这份报告里,存在一个致命的逻辑硬伤。如果按你说的,直接把公海纳入我国《环评法》管辖,那我们以后出去捞条鱼、取个海水样本,是不是都要写几百页的环评报告?你考虑过这会给我国的科考船增加多大的成本吗?',next:'act5_7'},
  act5_7:{type:'inner',scene:'外交部条法司 · 会客室',speaker:'林北(内心疯狂报警)',text:'(屏幕疯狂闪烁红光)完了完了完了,这就是条法司大佬的压迫感吗?一针见血,直戳大动脉啊!',apply:{bp:20,social:30},next:'act5_8'},
  act5_8:{type:'zhao',scene:'外交部条法司 · 会客室',speaker:'赵处长',text:'BBNJ 协定里的"环评启动标准",和我国国内法的标准根本对不上。这个问题不解决,你的第一步就是废纸。给你一分钟,说服我。',next:'act5_9'},
  act5_9:{type:'lightbulb',scene:'外交部条法司 · 会客室',text:'你的大脑正在飞速检索记忆,请提取关键法理卡片!林北头顶再次出现闪闪发光的大灯泡。',knowledge:{title:'林北的法学碎碎念 · 缺口二',content:'救命!她连这个都知道!没错,这就是【缺口二:启动标准不清】!\n\n国际法(BBNJ 协定第 24 条)用的是"双层门槛":\n  · 第一层:微小或暂时性影响\n  · 第二层:重大污染或重大有害变化\n\n国内法(《环评法》第 16 条)用的是"三级分类":\n  · 重大影响 → 做报告书\n  · 轻度影响 → 做报告表\n  · 影响很小 → 填登记表\n\n国际法是两道门,国内法是三个坑,两边根本对不齐!\n\n如果不弄清楚这中间的转换标准,我们要么过度环评(自己坑自己),要么环评不足(出去被国际制裁)。'},next:'act5_10'},
  act5_10:{type:'lin',scene:'外交部条法司 · 会客室',speaker:'林北',text:'(深吸一口气,眼神突然变得像四年的老油条一样犀利)赵处长,您担心的"过度增加成本",完全可以通过建立"双层门槛"的操作指南来解决!',next:'act5_11'},
  act5_11:{type:'zhao',scene:'外交部条法司 · 会客室',speaker:'赵处长',text:'(挑了挑眉,似乎有些意外你的心理素质)哦?具体怎么建立?你打算怎么把 BBNJ 的标准塞进国内的框架里?',next:'act5_choice'},
  act5_choice:{type:'system',scene:'关键决策 · 制度设计方案',text:'这是一道送命题,请谨慎选择你的制度设计方案:',choices:[
    {label:'A',text:'摆烂照抄型:"直接把 BBNJ 的法条原封不动翻译进我们的国内法里,国际条约怎么写我们就怎么管,这最保险!"',next:'act5_a_be'},
    {label:'B',text:'灵活变通型:"出台《北极公海环评分类管理名录》,将国内的『登记表/报告表/报告书』与 BBNJ 的『双层门槛』进行灵活对接,既履行国际义务,又保障本国科研自由!"',next:'act5_b',apply:{foreign:25,gap2:30}},
    {label:'C',text:'战术后仰型:"这题太难了,处长您觉得呢?"',next:'be_security'}
  ]},
  act5_b:{type:'zhao',scene:'外交部条法司 · 会客室',speaker:'赵处长',text:'(原本冰冷的眼神终于闪过一丝赞赏,她看了一下表)五分钟到了。你的脑子比我想象的要好用。',next:'act5_b2'},
  act5_b2:{type:'inner',scene:'外交部条法司 · 会客室',speaker:'林北',text:'(长舒一口气,瘫软在沙发上)活……活下来了……',apply:{hair:-20},next:'act5_b3'},
  act5_b3:{type:'zhao',scene:'外交部条法司 · 会客室',speaker:'赵处长',text:'启动标准的问题,我认可你的"对接思路"。但你别高兴得太早。就算标准定好了,你觉得这个名录该由谁来批?',next:'act5_b4'},
  act5_b4:{type:'lin',scene:'外交部条法司 · 会客室',speaker:'林北',text:'呃……《环评法》归生态环境部管,但海洋科考归自然资源部管,至于拿到国际上去通报,又得靠您外交部……',next:'act5_b5'},
  act5_b5:{type:'zhao',scene:'外交部条法司 · 会客室',speaker:'赵处长',text:'(双臂环抱,露出了看好戏的表情)没错。所谓的"九龙治水"。三个部门,谁也不想多揽麻烦,谁也不想大权旁落。你一个学生,怎么协调我们三个部委?',next:'act5_b6'},
  act5_b6:{type:'inner',scene:'外交部条法司 · 会客室',speaker:'林北(痛苦面具再次戴上)',text:'老周!你个杀千刀的!你到底给我挖了多大的坑啊啊啊啊!',apply:{days:-9,gap2:10,zhaoFav:30},next:'ending2'},
  ending2:{type:'ending2'},

  act6_1:{type:'narrator',scene:'国务院 · 部际联合会议室',text:'宽敞明亮的高级别会议室,椭圆形大红木桌。但气压低得让人喘不过气。',next:'act6_2'},
  act6_2:{type:'inner',scene:'国务院 · 部际联合会议室',speaker:'林北(满头大汗,内心爆鸣)',text:'(缩在会议桌最末端的折叠椅上)老周,你这辈子吃不上四个菜了!你不仅没来,你还把我扔进了全服最高难度的副本里!这三个女大佬的眼神能把我当场凌迟啊!',next:'act6_3'},
  act6_3:{type:'sun',scene:'国务院 · 部际联合会议室',speaker:'孙主任',text:'(单手把军用平板往桌上一拍,发出"砰"的一声)老钱,你不要拿着鸡毛当令箭!我们"雪龙 4 号"下周就要出发去北极进行地质勘探,你现在跟我说要全部停下来,补做全面的国际环评?还要向那个什么 BBNJ 秘书处报批?你知不知道船在港口停一天我们要烧多少经费?!',unlock:'sun',next:'act6_4'},
  act6_4:{type:'qian',scene:'国务院 · 部际联合会议室',speaker:'钱司长',text:'(推了推金丝眼镜,眼神从镜片上方冷冷射出。用红色的签字笔在文件上画了个大大的叉)老孙,你少拿经费压我。BBNJ 协定生效了,国际社会都在拿放大镜盯着我们。如果因为你们科考队粗心大意导致生态数据漏报,被国际环保组织抓了把柄,损害的是国家形象!按照《环评法》的精神,这种可能对海洋生态造成影响的活动,必须由我们生态环境部严格审批!',unlock:'qian',next:'act6_5'},
  act6_5:{type:'sun',scene:'国务院 · 部际联合会议室',speaker:'孙主任',text:'(冷笑一声,双手叉腰)《环评法》管的是国内海域!公海科考和深海资源开发,历来是我们自然资源部的管辖范围!我们的科考规程比你们那些坐在办公室里编出来的条文更懂大海!',next:'act6_6'},
  act6_6:{type:'qian',scene:'国务院 · 部际联合会议室',speaker:'钱司长',text:'(一拍桌子站了起来)胡闹!没有生态底线,你们那是盲目开发!',next:'act6_7'},
  act6_7:{type:'sun',scene:'国务院 · 部际联合会议室',speaker:'孙主任',text:'(毫不退让,逼近一步)没有资源勘探,你们那是空谈保护!',next:'act6_8'},
  act6_8:{type:'zhao',scene:'国务院 · 部际联合会议室',speaker:'赵处长',text:'(坐在旁边,慢条斯理地转着手里的红蓝铅笔,冷冷开口)吵够了吗?两位。COP1 大会召开在即,如果我们连内部谁说了算都定不下来,到了国际谈判桌上,就是个笑话。',next:'act6_9'},
  act6_9:{type:'zhao',scene:'国务院 · 部际联合会议室',speaker:'赵处长',text:'(目光突然转向角落里的林北)周教授的高徒,听说你昨天在条法司大放异彩。今天这局面,你有什么高见?',next:'act6_10'},
  act6_10:{type:'narrator',scene:'国务院 · 部际联合会议室',text:'唰——!钱司长和孙主任两道极其锐利的目光,瞬间如同探照灯一样打在林北身上。',next:'act6_11'},
  act6_11:{type:'inner',scene:'国务院 · 部际联合会议室',speaker:'林北(屏幕疯狂闪烁红光)',text:'救命!不要 cue 我!我只是个路过的学术废物啊!',apply:{bp:50,social:10},next:'act6_12'},
  act6_12:{type:'lightbulb',scene:'国务院 · 部际联合会议室',text:'求生本能激活!请提取前世记忆与法理卡片!林北头顶出现巨大的闪光灯泡。',knowledge:{title:'林北的法学碎碎念 · 缺口三',content:'这就是【缺口三:主管体制缺位】!俗称"九龙治水"!\n\nBBNJ 协定明确要求,各缔约国必须指定一个"主管当局(Competent Authority)"来负责国际环评的审查和报送。\n\n但我国目前的海洋管理体制是碎片的:\n  · 生态环境部 — 管环保审批\n  · 自然资源部 — 管海洋利用和科考\n  · 外交部 — 管对外联络\n\n法律根本没说公海的环评到底归谁管!这三个部门现在是"三不管"或者"都要管",不打起来才怪!'},next:'act6_13'},

let state=getInitialState();

function getInitialState(){
  return{
    current:null,
    stats:{hair:100,bp:80,social:90,days:119},
    depts:{resource:20,env:20,foreign:20,npc:20},
    gaps:{gap1:0,gap2:0,gap3:0,gap4:0},
    favors:{zhaoFav:0,qianFav:0,sunFav:0},
    flags:{},
    unlocked:['lin'],
    justUnlocked:null,
    panelOpen:false,
    lastChanges:null
  };
}

function applyChanges(changes){
  if(!changes) return null;
  const log=[];
  for(const k in changes){
    const v=changes[k];
    if(k in state.stats){
      state.stats[k]=Math.max(0,Math.min(200,state.stats[k]+v));
      log.push({key:k,delta:v,label:labelOf(k)});
    }else if(k in state.depts){
      state.depts[k]=Math.max(0,Math.min(100,state.depts[k]+v));
      log.push({key:k,delta:v,label:labelOf(k)});
    }else if(k in state.gaps){
      state.gaps[k]=Math.max(0,Math.min(100,state.gaps[k]+v));
      log.push({key:k,delta:v,label:labelOf(k)});
    }else if(k in state.favors){
      state.favors[k]=Math.max(0,Math.min(100,state.favors[k]+v));
      log.push({key:k,delta:v,label:labelOf(k)});
    }
  }
  return log;
}

function labelOf(k){
  return {hair:'发量',bp:'血压',social:'社恐指数',days:'剩余天数',
    resource:'自然资源部',env:'生态环境部',foreign:'外交部',
    npc:'人大支持',gap1:'缺口一完成度',gap2:'缺口二完成度',gap3:'缺口三完成度',gap4:'缺口四完成度',
    zhaoFav:'赵处长好感',qianFav:'钱司长好感',sunFav:'孙主任好感'}[k]||k;
}

function checkBE(){
  if(state.stats.hair<=20) return 'be_bald';
  if(state.stats.bp>=150) return 'be_icu';
  if(state.stats.social>=95) return 'be_social';
  if(state.stats.days<=0) return 'be_timeout';
  return null;
}

function unlockChar(id){
  if(state.unlocked.indexOf(id)===-1){
    state.unlocked.push(id);
    state.justUnlocked=id;
  }
}

function goTo(id,changes,flag){
  state.lastChanges=applyChanges(changes);
  state.justUnlocked=null;
  if(flag) state.flags[flag]=true;
  const be=checkBE();
  state.current=be||id;
  const sc=scenes[state.current];
  if(sc&&sc.unlock) unlockChar(sc.unlock);
  if(state.current==='ending'){
    const dom=Object.entries(state.depts).sort((a,b)=>b[1]-a[1])[0];
    const map={foreign:'zhao',env:'qian',resource:'sun'};
    const bossId=map[dom[0]];
    if(bossId) unlockChar(bossId);
  }
  window.scrollTo({top:0,behavior:'smooth'});
  render();
}

function escHtml(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'})[c])}

function charCard(id){
  const c=characters[id];
  return `<div class="char-card">
    <div class="char-head">
      <div class="avatar ${c.av}">${c.ini}</div>
      <div>
        <p class="char-name">${escHtml(c.name)}</p>
        <p class="char-role">${escHtml(c.role)}</p>
      </div>
    </div>
    <p class="char-section">身份</p>
    <p class="char-content">${escHtml(c.identity)}</p>
    <p class="char-section">性格标签</p>
    <div class="char-traits">${c.traits.map(t=>`<span class="trait-tag">${escHtml(t)}</span>`).join('')}</div>
    <p class="char-section">核心动机</p>
    <p class="char-content char-motive">${escHtml(c.motive)}</p>
    <p class="char-section">视觉特征</p>
    <p class="char-content" style="color:#888;font-size:11.5px">${escHtml(c.look)}</p>
  </div>`;
}

function lockedCard(){
  return `<div class="char-card locked">
    <div class="lock-icon">◯</div>
    <div style="font-size:13px">未解锁</div>
    <div style="font-size:11px">推进剧情解锁档案</div>
  </div>`;
}

function profilePanel(){
  if(!state.panelOpen) return '';
  const cards=charOrder.map(id=>state.unlocked.indexOf(id)>=0?charCard(id):lockedCard()).join('');
  return `<div class="profile-panel">
    <div class="profile-panel-head">
      <span class="ph-title">角色档案 ${state.unlocked.length} / ${charOrder.length}</span>
      <button class="ph-close" onclick="window.__bbnj.toggle()">收起 ×</button>
    </div>
    <div class="char-grid">${cards}</div>
  </div>`;
}

function statusBar(){
  const s=state.stats;
  const bpCls=s.bp>=130?'stat danger':s.bp>=100?'stat warn':'stat';
  const scCls=s.social>=85?'stat danger':s.social>=70?'stat warn':'stat';
  const hairCls=s.hair<=30?'stat danger':s.hair<=50?'stat warn':'stat';
  return `<div class="status-bar">
    <span class="${hairCls}"><span class="stat-icon">◆</span>发量 <strong>${s.hair}</strong></span>
    <span class="${bpCls}"><span class="stat-icon">◆</span>血压 <strong>${s.bp}</strong></span>
    <span class="${scCls}"><span class="stat-icon">◆</span>社恐 <strong>${s.social}</strong></span>
    <span class="stat"><span class="stat-icon">◆</span>剩余 <strong>${s.days}</strong> 天</span>
    <button class="profile-btn" onclick="window.__bbnj.toggle()">档案 ${state.unlocked.length}/${charOrder.length}</button>
  </div>`;
}

function changeLog(log){
  if(!log||!log.length) return '';
  const items=log.map(l=>{
    const isNeg=(l.key==='bp'||l.key==='social');
    const good=isNeg?l.delta<0:l.delta>0;
    return `<span class="delta ${good?'good':'bad'}">${escHtml(l.label)} ${l.delta>0?'+':''}${l.delta}</span>`;
  }).join('');
  return `<div class="change-log"><span class="cl-label">属性变化:</span>${items}</div>`;
}

function unlockToast(){
  if(!state.justUnlocked) return '';
  const c=characters[state.justUnlocked];
  return `<div class="unlock-toast"><span style="font-size:16px">★</span>新角色档案已解锁:<strong style="margin-left:4px">${escHtml(c.name)}</strong> · ${escHtml(c.role)}</div>`;
}

function renderTitle(){
  document.getElementById('app').innerHTML=`<div class="title-screen">
    <div class="logo">北</div>
    <h1>北极星计划:重生</h1>
    <div class="subtitle">BBNJ · 互动叙事 DEMO</div>
    <div class="desc">2030 年 4 月,中国科考船"雪龙 4 号"在北极公海被国际制裁,导师含恨进 ICU。<br><br>带着十年记忆重生回 2026 年 1 月 19 日的你,只剩 <strong>119 天</strong> 时间,要在 COP1 召开前补完《环评法》的五大制度缺口。<br><br>这一次,不能再输。</div>
    <div class="meta">研究主题 · BBNJ 协定 vs 中国《环境影响评价法》<br>本 DEMO 收录第一关「适用范围不明」<br>大学生创新创业训练计划 · 互动叙事产出</div>
    <button class="start-btn" onclick="window.__bbnj.start()">开 始 游 戏</button>
  </div>
  <div class="footer">建议在手机或电脑浏览器中游玩 · 单局约 8-12 分钟<br>属性触线会触发 Bad Ending,选择部门策略决定第二关分支</div>`;
}

function render(){
  const root=document.getElementById('app');
  if(state.current===null){renderTitle();return}
  const sc=scenes[state.current];

    const s=state.stats,d=state.depts,g=state.gaps;

      <h3>第一关 · 适用范围缺口<br>${perfect?'完美通关':'勉强通关'}</h3>
      <p>你成功被导师"套路",成为国家海洋立法的背锅……啊不,急先锋!</p>
      <div class="countdown-label">距离 COP1 召开还有</div>
      <div class="countdown">${s.days} 天</div>
      <p>报告递交方向:<strong>${escHtml(domInfo.name)}</strong>(支持度 ${dom[1]})</p>
      <p>缺口一完成度:<strong>${g.gap1}%</strong></p>
      ${bossPreview}
      <div class="stage-list">
        <div class="stage-item done"><span class="si-icon">●</span>第一关:适用范围不明 — 通关</div>
        <div class="stage-item"><span class="si-icon">○</span>第二关:启动标准不清 — 即将开放</div>
        <div class="stage-item"><span class="si-icon">○</span>第三关:主管体制缺位</div>
        <div class="stage-item"><span class="si-icon">○</span>第四关:程序接口不足</div>
        <div class="stage-item"><span class="si-icon">○</span>第五关:信息协作薄弱</div>
      </div>
      <div class="next-stage-text">下一关预告 · 你将走进 ${escHtml(domInfo.name)} 大楼,迎接 ${domInfo.boss?escHtml(characters[domInfo.boss].name):'部委大佬'} 的灵魂拷问。请保护好你脆弱的社恐神经……</div>
      ${domInfo.boss==='zhao'?
        `<button class="start-btn" style="margin-top:20px;padding:14px 36px;font-size:14px;letter-spacing:2px" onclick="window.__bbnj.goto('act5_1')">进入第二关 · 赵处长 Boss 战 →</button>`:
        `<div style="margin:18px 0 6px;padding:14px 18px;background:#fff;border-radius:12px;font-size:12px;color:#888;line-height:1.85;text-align:left">本 DEMO 当前完整收录【外交部 · 赵处长线】(第二关)。<br>${escHtml(domInfo.name)} 路线尚在制作中,推荐重开选择"拿捏外交部",体验完整的部委 Boss 战。</div>`
      }
      <button class="restart-btn" onclick="window.__bbnj.restart()">重 开 一 局</button>
    </div>`;
    return;
  }

  if(sc.type==='ending2'){
    const s=state.stats,g=state.gaps,f=state.favors;
    const perfect=g.gap2>=30;
    root.innerHTML=`${statusBar()}${profilePanel()}<div class="ending-clear">
      <div class="trophy">★ ★</div>
      <h3>第二关 · 启动标准不清<br>${perfect?'惊险通关':'勉强通关'}</h3>
      <p>你成功用"国内名录对接国际门槛"的方案征服了高冷的赵处长。</p>
      <div class="countdown-label">距离 COP1 召开还有</div>
      <div class="countdown">${s.days} 天</div>
      <p>赵处长好感度:<strong>已解锁</strong>(从"嫌弃"升级为"可利用的工具人")</p>
      <p>缺口一完成度:<strong>${g.gap1}%</strong> · 缺口二完成度:<strong>${g.gap2}%</strong></p>
      <div class="boss-preview"><div class="bp-title">— 已征服的对手 —</div>${charCard('zhao')}</div>
      <div class="stage-list">
        <div class="stage-item done"><span class="si-icon">●</span>第一关:适用范围不明 — 通关</div>
        <div class="stage-item done"><span class="si-icon">●</span>第二关:启动标准不清 — 通关</div>
        <div class="stage-item"><span class="si-icon">○</span>第三关:主管体制缺位 — 即将开放</div>
        <div class="stage-item"><span class="si-icon">○</span>第四关:程序接口不足</div>
        <div class="stage-item"><span class="si-icon">○</span>第五关:信息协作薄弱</div>
      </div>
      <div class="next-stage-text">下一关预告 · 警告:你即将陷入<strong>生态环境部钱司长</strong>与<strong>自然资源部孙主任</strong>的"神仙打架"之中。本关名为「主管体制缺位」,俗称——九龙治水。请系好安全带,准备见证三个部门的修罗场。</div>
      <button class="start-btn" style="margin-top:20px;padding:14px 36px;font-size:14px;letter-spacing:2px" onclick="window.__bbnj.goto('act6_1')">进入第三关 · 九龙治水修罗场 →</button>
      <button class="restart-btn" onclick="window.__bbnj.restart()">重 开 一 局</button>
    </div>`;
    return;
  }

  if(sc.type==='ending3'){
    const s=state.stats,g=state.gaps,f=state.favors;
    const perfect=g.gap3>=30;
    root.innerHTML=`${statusBar()}${profilePanel()}<div class="ending-clear">
      <div class="trophy">★ ★ ★</div>
      <h3>第三关 · 主管体制缺位<br>${perfect?'高情商通关':'勉强通关'}</h3>
      <p>你成功在两位女魔头的夹缝中生存下来,建立了"部际联席审批"的初步构想。</p>
      <div style="margin:14px auto;padding:10px 18px;background:#fff;border-radius:99px;display:inline-block;font-size:13px;color:#7a4a18;border:1px solid #e8c98c">★ 解锁成就 · 极限端水大师</div>
      <div class="countdown-label">距离 COP1 召开还有</div>
      <div class="countdown">${s.days} 天</div>
      <p>缺口完成度:一 <strong>${g.gap1}%</strong> · 二 <strong>${g.gap2}%</strong> · 三 <strong>${g.gap3}%</strong></p>
      <p>NPC 好感:赵处长 <strong>${f.zhaoFav}</strong> · 钱司长 <strong>${f.qianFav}</strong> · 孙主任 <strong>${f.sunFav}</strong></p>
      <div class="boss-preview" style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div>${charCard('qian')}</div><div>${charCard('sun')}</div></div>
      <div class="stage-list">
        <div class="stage-item done"><span class="si-icon">●</span>第一关:适用范围不明 — 通关</div>
        <div class="stage-item done"><span class="si-icon">●</span>第二关:启动标准不清 — 通关</div>
        <div class="stage-item done"><span class="si-icon">●</span>第三关:主管体制缺位 — 通关</div>
        <div class="stage-item"><span class="si-icon">○</span>第四关:程序接口不足 — 即将开放</div>
        <div class="stage-item"><span class="si-icon">○</span>第五关:信息协作薄弱</div>
      </div>
      <div class="next-stage-text">下一关预告 · 警告:你即将面对枯燥到让人头秃的行政流程图设计,请备好生发水!本关名为「程序接口不足」,主题是把今天达成的部际共识,变成纸面上的流程文件。</div>
      <button class="start-btn" style="margin-top:20px;padding:14px 36px;font-size:14px;letter-spacing:2px" onclick="window.__bbnj.goto('act7_1')">进入第四关 · 深夜流程图之战 →</button>
      <button class="restart-btn" onclick="window.__bbnj.restart()">重 开 一 局</button>
    </div>`;
    return;
  }

  if(sc.type==='ending4'){
    const s=state.stats,g=state.gaps,f=state.favors;
    const perfect=g.gap4>=30;
    root.innerHTML=`${statusBar()}${profilePanel()}<div class="ending-clear">
      <div class="trophy">★ ★ ★ ★</div>
      <h3>第四关 · 程序接口不足<br>${perfect?'逻辑通关':'勉强通关'}</h3>
      <p>${perfect?'你成功用"并联嵌套"方案打通了国内审批与国际报送的生死时速。':'你选择了稳妥的串联方案,虽然跑通了流程,但时间被压缩到极限。'}</p>
      ${perfect?`<div style="margin:14px auto;padding:10px 18px;background:#fff;border-radius:99px;display:inline-block;font-size:13px;color:#7a4a18;border:1px solid #e8c98c">★ 解锁成就 · 流程图大师</div>`:''}
      <div class="countdown-label">距离 COP1 召开还有</div>
      <div class="countdown">${s.days} 天</div>
      <p>缺口完成度:一 <strong>${g.gap1}%</strong> · 二 <strong>${g.gap2}%</strong> · 三 <strong>${g.gap3}%</strong> · 四 <strong>${g.gap4}%</strong></p>
      <p>NPC 好感:赵 <strong>${f.zhaoFav}</strong> · 钱 <strong>${f.qianFav}</strong> · 孙 <strong>${f.sunFav}</strong></p>
      <div class="boss-preview"><div class="bp-title">— 与你深夜并肩作战的两位女魔头 —</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">${charCard('zhao')}${charCard('qian')}</div></div>
      <div class="stage-list">
        <div class="stage-item done"><span class="si-icon">●</span>第一关:适用范围不明 — 通关</div>
        <div class="stage-item done"><span class="si-icon">●</span>第二关:启动标准不清 — 通关</div>
        <div class="stage-item done"><span class="si-icon">●</span>第三关:主管体制缺位 — 通关</div>
        <div class="stage-item done"><span class="si-icon">●</span>第四关:程序接口不足 — 通关</div>
        <div class="stage-item"><span class="si-icon">○</span>第五关:信息协作薄弱 — 即将开放</div>
      </div>
      <div class="next-stage-text">下一关预告 · 决战即将到来!最后一关「信息协作薄弱」要解决的是:如何确保数据报送给国际时,既不泄露国家机密,又能满足国际协作要求。林北的发际线,迎来最后的考验。</div>
      <div style="margin:18px 0 6px;padding:14px 18px;background:#fff;border-radius:12px;font-size:12px;color:#888;line-height:1.85;text-align:left">第五关「信息协作」剧本撰写中,敬请期待最终章。<br>当前 DEMO 已完整收录序章 + 第一、二、三、四关(共约 25 分钟流程)。</div>
      <button class="restart-btn" onclick="window.__bbnj.restart()">重 开 一 局</button>
    </div>`;
    return;
  }

  let html=statusBar()+profilePanel();
  if(sc.scene) html+=`<div class="scene-tag">— ${escHtml(sc.scene)} —</div>`;
  html+='<div class="stage">';

  if(sc.type==='narrator'){
    html+=`<div class="narrator">${escHtml(sc.text)}</div>`;
  }else if(sc.type==='system'){
    html+=`<div class="system-msg"><strong style="display:block;margin-bottom:6px;font-size:12px;letter-spacing:1px">[ 系统提示 ]</strong>${escHtml(sc.text)}</div>`;
  }else if(sc.type==='lightbulb'){
    html+=`<div class="narrator">${escHtml(sc.text)}</div>
      <div style="text-align:center"><button class="lightbulb" onclick="window.__bbnj.showKc()"><span class="lightbulb-icon">✦</span>点开看看(法学碎碎念彩蛋)</button></div>
      <div id="kc-box"></div>`;
  }else if(sc.type==='inner'){
    html+=`<div class="speaker inner">${escHtml(sc.speaker)}</div><div class="dialog" style="color:#6a5a8a;font-style:italic">${escHtml(sc.text)}</div>`;
  }else{
    const speakerTypes=['zhou','lin','zhao','qian','sun'];
    const cls=speakerTypes.indexOf(sc.type)>=0?sc.type:'';
    html+=`<div class="speaker ${cls}">${escHtml(sc.speaker)}</div><div class="dialog">${escHtml(sc.text)}</div>`;
  }

  if(state.lastChanges) html+=changeLog(state.lastChanges);
  html+=unlockToast();

  if(sc.choices){
    html+='<div class="choices">';
    sc.choices.forEach((c,i)=>{
      html+=`<button class="choice-btn" data-idx="${i}"><span class="choice-label">[${escHtml(c.label||'')}]</span>${escHtml(c.text)}</button>`;
    });
    html+='</div>';
  }else if(sc.next){
    html+=`<button class="next-btn" data-next="${sc.next}">继 续 →</button>`;
  }

  html+='</div>';
  root.innerHTML=html;
  state.lastChanges=null;
  state.justUnlocked=null;

  root.querySelectorAll('.choice-btn').forEach((b,i)=>{
    b.onclick=()=>{const c=sc.choices[i];goTo(c.next,c.apply,c.flag);};
  });
  const nb=root.querySelector('.next-btn');
  if(nb) nb.onclick=()=>goTo(nb.dataset.next,sc.apply);
}

window.__bbnj={
  start(){state.current='intro1';render();},
  toggle(){state.panelOpen=!state.panelOpen;render();},
  showKc(){
    const sc=scenes[state.current];
    const k=sc.knowledge;
    document.getElementById('kc-box').innerHTML=`<div class="knowledge-card">
      <h4>✦ ${escHtml(k.title)}</h4>
      <div class="kc-content">${escHtml(k.content)}</div>
      <span class="close-k" onclick="document.getElementById('kc-box').innerHTML=''">收起卡片</span>
    </div>`;
  },
  restart(){state=getInitialState();render();},
  goto(id){state.current=id;state.lastChanges=null;state.justUnlocked=null;window.scrollTo({top:0,behavior:'smooth'});render();}
};

render();
})();
</script>
</body>
